kind = "web"
previewPath = "/"
title = "Orvyn"
version = "1.0.0"
id = "artifacts/orvyn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21014

[services.development]
run = "pnpm --filter @workspace/orvyn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orvyn", "run", "build" ]
publicDir = "artifacts/orvyn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21014"
BASE_PATH = "/"
